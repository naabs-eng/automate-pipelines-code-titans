sql_server:
  server: "localhost\\SQLEXPRESS"
  database: "SalesDB"

spark:
  app_name: "SalesDataPipeline"
  master: "local[*]"
  memory: "4g"
  executor_memory: "2g"
  jdbc_driver_path: "drivers/mssql-jdbc-13.4.0.jre11.jar"

pipeline:
  frequency: "daily"
  data_format: "parquet"
  # test: trigger schema-validation workflow via PR

paths:
  bronze: "./data/bronze"
  silver: "./data/silver"
  gold: "./data/gold"
  logs: "./logs"

tables:
  source:
    - name: "dbo.Products"
      bronze_table: "products"
    - name: "dbo.Customers"
      bronze_table: "customers"
    - name: "dbo.Orders"
      bronze_table: "orders"
    - name: "dbo.OrderItems"
      bronze_table: "order_items"
