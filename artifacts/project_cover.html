<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px;
    height: 600px;
    overflow: hidden;
    background: #04040c;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Circuit floor ── */
  .floor {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 260px;
    perspective: 400px;
  }
  .floor-inner {
    width: 100%;
    height: 100%;
    transform: rotateX(55deg) translateY(30px);
    transform-origin: bottom center;
    background-color: #04040c;
    background-image:
      linear-gradient(rgba(0,255,180,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,180,0.18) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* circuit traces */
  .traces {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .traces svg {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 260px;
  }

  /* ── Ambient glow ── */
  .glow-base {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 100px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.55) 0%, transparent 70%);
    filter: blur(18px);
  }

  /* ── Orb ── */
  .orb-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 10px;
    z-index: 10;
    margin-top: -30px;
  }
  .orb {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%,
      #c4b5fd 0%,
      #7c3aed 30%,
      #1e1b4b 65%,
      #0d0d1f 100%
    );
    box-shadow:
      0 0 30px rgba(139,92,246,0.9),
      0 0 70px rgba(124,58,237,0.6),
      0 0 120px rgba(99,102,241,0.35),
      inset 0 -10px 30px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }

  /* neural lines on orb */
  .orb::before {
    content: '';
    position: absolute;
    inset: -10px;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 12px,
        rgba(196,181,253,0.08) 12px,
        rgba(196,181,253,0.08) 13px
      );
    border-radius: 50%;
  }
  .orb::after {
    content: '';
    position: absolute;
    top: 15%; left: 20%;
    width: 35%; height: 35%;
    background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
    border-radius: 50%;
    filter: blur(4px);
  }

  /* orbiting ring */
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 220px; height: 60px;
    margin: -30px 0 0 -110px;
    border: 2px solid rgba(0,255,200,0.4);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(0,255,200,0.3), inset 0 0 10px rgba(0,255,200,0.1);
    transform: rotateX(72deg);
  }
  .ring2 {
    position: absolute;
    top: 50%; left: 50%;
    width: 210px; height: 55px;
    margin: -27px 0 0 -105px;
    border: 1px solid rgba(248,113,113,0.35);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(248,113,113,0.25);
    transform: rotateX(72deg) rotateZ(60deg);
  }

  /* ── Text ── */
  .title-wrap {
    position: relative;
    z-index: 10;
    text-align: center;
  }
  h1 {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    text-shadow:
      0 0 10px rgba(167,139,250,1),
      0 0 30px rgba(139,92,246,0.8),
      0 0 60px rgba(99,102,241,0.5);
  }
  .sub {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(0,255,180,0.75);
    margin-top: 6px;
    text-shadow: 0 0 10px rgba(0,255,180,0.5);
  }

  /* ── Layer badges ── */
  .badges {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .badge {
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .b { background: rgba(180,83,9,0.25); border: 1px solid #f59e0b; color: #fbbf24; text-shadow: 0 0 8px #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.2); }
  .s { background: rgba(71,85,105,0.25); border: 1px solid #94a3b8; color: #cbd5e1; text-shadow: 0 0 8px #94a3b8; box-shadow: 0 0 10px rgba(148,163,184,0.15); }
  .g { background: rgba(161,98,7,0.25); border: 1px solid #fbbf24; color: #fde68a; text-shadow: 0 0 10px #fbbf24; box-shadow: 0 0 14px rgba(251,191,36,0.3); }
  .arrow { color: rgba(139,92,246,0.7); font-size: 14px; align-self: center; }
</style>
</head>
<body>

  <!-- floor grid -->
  <div class="floor"><div class="floor-inner"></div></div>

  <!-- ambient glow under orb -->
  <div class="glow-base"></div>

  <!-- orb -->
  <div class="orb-wrap">
    <div class="orb"></div>
    <div class="ring"></div>
    <div class="ring2"></div>
  </div>

  <!-- title -->
  <div class="title-wrap">
    <h1>Neural Forge</h1>
    <div class="sub">AI-Powered Data Pipeline</div>
  </div>

  <!-- layer badges -->
  <div class="badges">
    <span class="badge b">Bronze</span>
    <span class="arrow">→</span>
    <span class="badge s">Silver</span>
    <span class="arrow">→</span>
    <span class="badge g">Gold</span>
  </div>

</body>
</html>
